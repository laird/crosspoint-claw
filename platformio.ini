[platformio]
default_envs = default
extra_configs = platformio.local.ini

[crosspoint]
version = 1.3.28-claw

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  # Increase Arduino loopTask stack from 8KB to 16KB.
  # The ESP OPF parser + SdFat call chain overflows 8KB. This flag overrides
  # the #ifndef ARDUINO_LOOP_STACK_SIZE guard in cores/esp32/main.cpp.
  -DARDUINO_LOOP_STACK_SIZE=16384
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort

build_unflags =
  -std=gnu++11

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.sdkconfig = sdkconfig.defaults

extra_scripts =
  pre:scripts/git_version.py
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/patch_jpegdec.py
  pre:scripts/git_branch.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  bitbank2/JPEGDEC @ ^1.8.0
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is injected via src/build_version.generated.h (written by
  ; scripts/git_branch.py). Using -include instead of -D ensures SCons sees the
  ; header as a file dependency and recompiles all TUs when the SHA changes.
  -include ${PROJECT_DIR}/src/build_version.generated.h
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-claw\"
  -DCROSSPOINT_GIT_SHA=\"release\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=0 ; Set log level to error for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-claw-rc\"
  -DCROSSPOINT_GIT_SHA=\"${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds

[env:native]
platform = native
test_framework = unity
lib_compat_mode = strict
lib_deps = bblanchon/ArduinoJson @ 7.4.2
lib_ignore = hal, GfxRenderer, I18n, EpdFont, Epub, Logging, Serialization, FsHelpers, ZipFile, InflateReader, JpegToBmpConverter, PngToBmpConverter, Utf8, Txt, KOReaderSync, expat, OpdsParser, picojpeg, uzlib, Xtc
build_flags =
  -std=c++17
  -I test/native/stubs
  -I src
  -I lib/I18n
  -I lib/Serialization
  -I lib/KOReaderSync
  -I lib/EpdFont
test_filter = native/test_*
test_build_src = yes
build_src_filter = +<JsonSettingsIO.cpp>

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
