version: "2"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!lib/I18n/I18nKeys.h"
    - "!lib/I18n/I18nStrings.h"
    - "!lib/I18n/I18nStrings.cpp"
  path_instructions:
    - path: "**/*.cpp"
      instructions: |
        This is embedded C++ for ESP32-C3 (Arduino + ESP-IDF via PlatformIO).
        Key constraints:
        - RAM is very limited (~327KB total, ~95KB currently used). Flag any heap allocations in hot paths.
        - Stack depth matters — async/OTA tasks need 16KB stack minimum for SSL+SdFat call chains.
        - FreeRTOS is used for tasks; flag any shared state without portMUX protection.
        - No exceptions, no RTTI. Prefer assert() over runtime error checks for programmer errors.
        - Assertions are always enabled (no NDEBUG). Use them to enforce invariants.
        - Prefer static buffers over heap allocation in performance-sensitive paths.
        - All serialized data uses SECTION_FILE_VERSION; flag format changes that don't bump it.
    - path: "lib/I18n/translations/*.yaml"
      instructions: |
        These are translation YAML files. Missing keys are auto-filled from English by gen_i18n.py.
        Only flag issues with the English (english.yaml) file — missing keys in other languages are expected and handled by the build system.

chat:
  auto_reply: true
